<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="https://cdn0.iconfinder.com/data/icons/social-glyph/30/tumblr-60.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Legal - TLC Anchor And Barrier</title>

<style>
body {
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
}

.header {
    background-color: lightgray;
    padding: 30px 10px;
}
.header h2 {
    margin: 10px 0;
    font-size: 32px;
}

.topnav {
    background-color: darkslategray;
    padding: 8px 0;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}
.link-topnav {
    color: whitesmoke;
    margin: 0 8px;
    text-decoration: none;
    font-size: 15px;
    padding: 4px 8px;
}
.link-topnav:hover {
    font-weight: bold;
    cursor: pointer;
}

.columns {
    display: flex;
    justify-content: center;
    padding: 20px;
    flex-wrap: wrap;
}

.column {
    max-width: 800px;
    width: 90%;
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: left;
}

.V2_Img {
    min-height: 48px;
    min-width: 48px;
    border-radius: 50%;
    background-color: darkslategray;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.logout-btn {
    margin-top: 15px;
    padding: 8px 15px;
    border: none;
    border-radius: 6px;
    background-color: darkslategray;
    color: white;
    cursor: pointer;
}

#output {
    white-space: pre-wrap;
    line-height: 1.6;
    font-size: 15px;
}

</style>
</head>

<body>

<div class="header">
    <h2>Legal</h2>
</div>

<div class="topnav" id="topnav">
    <a class="link-topnav" href="index.html">Home</a>
    <a class="link-topnav" href="#">Contact</a>
    <a class="link-topnav" id="logout-btn">Logout</a>
</div>

<section id="backend-v2" class="columns"></section>

<script>
(function () {
    const container = document.getElementById('backend-v2');
    const topnav = document.getElementById('topnav');

    function getCookie(name) {
        const cookies = document.cookie.split("; ");
        for (let c of cookies) {
            const [key, value] = c.split("=");
            if (key === name) return value;
        }
        return null;
    }

    function setSession(username) {
        const expiry = Date.now() + (60 * 60 * 1000);
        const sessionData = btoa(username + "|" + expiry);
        document.cookie = "session=" + sessionData + "; path=/";
    }

    function deleteSession() {
        document.cookie = "session=; path=/; max-age=0";
    }

    function redirectHome() {
        window.location.href = "../index.html";
    }

    const usernameMap = {
        "DVR": "Developer",
        "TLC-Chad": "Chad",
        "TLC-Terri": "Terri",
        "NewUser": "NewUser"
    };

    const raw = getCookie("session");
    if (!raw) {
        redirectHome();
        return;
    }

    function renderDashboard(username) {
        const displayName = usernameMap[username] || username;

        if (window.isLegalPage) {

            topnav.style.display = "flex";

            container.innerHTML = `

                <div class="column">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <div class="V2_Img">${displayName}</div>
                        <div>
                            <h3 style="margin:0;">${displayName}</h3>
                            <p style="margin:0;">Viewing Legal Page</p>
                        </div>
                    </div>

                    <button class="logout-btn" id="simple-logout">Logout</button>
                </div>

                <div class="column V2_ImagePg">
                    <div class="V2_Img usr-btn" data-user="DVR">Dev</div>
                    <div class="V2_Img usr-btn" data-user="TLC-Chad">Chad</div>
                    <div class="V2_Img usr-btn" data-user="TLC-Terri">Terri</div>
                    <div class="V2_Img usr-btn" data-user="NewUser">___</div>
                </div>

                <div class="column">
                    <h3>Terms of Service</h3>
                    <div id="output">Loading...</div>
                </div>
            `;

            fetch("https://dvr-properties-ghe.github.io/TLC-AAB-NewSite/tos.txt")
                .then(r => r.text())
                .then(text => {
                    document.getElementById("output").textContent = text;
                })
                .catch(err => {
                    document.getElementById("output").textContent = "Error: " + err;
                });

            document.getElementById("simple-logout").addEventListener("click", () => {
                deleteSession();
                redirectHome();
            });

            container.querySelectorAll(".usr-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const newUser = btn.dataset.user;
                    setSession(newUser);
                    renderDashboard(newUser);
                });
            });

            return;
        }

        // fallback simple view
        container.innerHTML = `
            <div class="column">
                <div class="V2_Img" style="margin:auto;">${displayName}</div>
                <h3>Welcome ${displayName}</h3>
                <button class="logout-btn" id="simple-logout">Logout</button>
            </div>
        `;

        document.getElementById("simple-logout").addEventListener("click", () => {
            deleteSession();
            redirectHome();
        });
    }

    try {
        const [user, expiry] = atob(raw).split("|");

        if (Date.now() > parseInt(expiry)) {
            deleteSession();
            redirectHome();
            return;
        }

        renderDashboard(user);

    } catch (e) {
        deleteSession();
        redirectHome();
    }

    document.getElementById("logout-btn").addEventListener("click", () => {
        deleteSession();
        redirectHome();
    });

})();
</script>

<script>
window.isLegalPage = true;
</script>

</body>
</html>
