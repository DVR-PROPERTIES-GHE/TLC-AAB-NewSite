<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="https://cdn0.iconfinder.com/data/icons/social-glyph/30/tumblr-60.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TLC Legal Dashboard</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    text-align: center;
}

/* HEADER */
.header {
    background-color: lightgray;
    padding: 30px 10px;
}
.header h2 {
    margin: 10px 0;
    font-size: 32px;
}

/* NAV */
.topnav {
    background-color: darkslategray;
    padding: 8px 0;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}
.link-topnav {
    color: whitesmoke;
    margin: 0 8px;
    text-decoration: none;
    font-size: 15px;
    padding: 4px 8px;
    cursor: pointer;
}
.link-topnav:hover {
    font-weight: bold;
}

/* LAYOUT */
.columns {
    display: flex;
    justify-content: center;
    padding: 20px;
    flex-wrap: wrap;
    gap: 20px;
}

/* CARD */
.column {
    max-width: 800px;
    width: 90%;
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: left;
}

/* USER ICON */
.V2_Img {
    min-height: 48px;
    min-width: 48px;
    border-radius: 50%;
    background-color: darkslategray;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

/* USER SWITCHER */
.V2_ImagePg {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    padding: 10px;
    justify-content: center;
}

.usr-btn {
    min-height: 48px;
    min-width: 48px;
    border-radius: 50%;
    background-color: white;
    border: 2px solid darkslategray;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 12px;
}

/* TOS TEXT */
#output {
    white-space: pre-wrap;
    line-height: 1.6;
    font-size: 15px;
}

/* BUTTON */
.logout-btn {
    margin-top: 15px;
    padding: 8px 15px;
    border: none;
    border-radius: 6px;
    background-color: darkslategray;
    color: white;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="header">
    <h2>Legal Dashboard</h2>
</div>

<div class="topnav" id="topnav">
    <a class="link-topnav" href="index.html">Home</a>
    <a class="link-topnav" href="#">Contact</a>
    <a class="link-topnav" id="logout-btn">Logout</a>
</div>

<section id="backend-v2" class="columns"></section>

<script>
(function () {

    const container = document.getElementById("backend-v2");

    const usernameMap = {
        "DVR": "Dev",
        "TLC-Chad": "Chad",
        "TLC-Terri": "Terri",
        "NewUser": "New"
    };

    function getCookie(name) {
        return document.cookie.split("; ")
            .find(row => row.startsWith(name + "="))
            ?.split("=")[1];
    }

    function deleteSession() {
        document.cookie = "session=; path=/; max-age=0";
    }

    function redirectHome() {
        window.location.href = "../index.html";
    }

    const raw = getCookie("session");
    if (!raw) {
        redirectHome();
        return;
    }

    let user;
    try {
        const [u, exp] = atob(raw).split("|");
        if (Date.now() > parseInt(exp)) {
            deleteSession();
            redirectHome();
            return;
        }
        user = u;
    } catch {
        deleteSession();
        redirectHome();
        return;
    }

    function render(user) {

        const display = usernameMap[user] || user;

        container.innerHTML = `

            <!-- USER CARD -->
            <div class="column">
                <div style="display:flex; gap:15px; align-items:center;">
                    <div class="V2_Img">${display}</div>
                    <div>
                        <h3 style="margin:0;">${display}</h3>
                        <p style="margin:0;">Viewing Legal</p>
                    </div>
                </div>

                <button class="logout-btn" id="logout">Logout</button>
            </div>

            <!-- USER SWITCHER -->
            <div class="column V2_ImagePg">
                <div class="usr-btn" data-user="DVR">Dev</div>
                <div class="usr-btn" data-user="TLC-Chad">Chad</div>
                <div class="usr-btn" data-user="TLC-Terri">Terri</div>
                <div class="usr-btn" data-user="NewUser">New</div>
            </div>

            <!-- TOS POST CARD -->
            <div class="column">
                <h3>Terms of Service</h3>
                <div id="output">Loading...</div>
            </div>
        `;

        // LOAD TOS
        fetch("https://dvr-properties-ghe.github.io/TLC-AAB-NewSite/tos.txt")
            .then(r => r.text())
            .then(t => {
                document.getElementById("output").textContent = t;
            })
            .catch(e => {
                document.getElementById("output").textContent = "Error loading TOS";
            });

        // LOGOUT
        document.getElementById("logout").onclick = () => {
            deleteSession();
            redirectHome();
        };

        // USER SWITCH
        container.querySelectorAll(".usr-btn").forEach(btn => {
            btn.onclick = () => {
                const newUser = btn.dataset.user;
                document.cookie =
                    "session=" + btoa(newUser + "|" + (Date.now() + 3600000)) +
                    "; path=/";

                render(newUser);
            };
        });
    }

    render(user);

})();
</script>

</body>
</html>
