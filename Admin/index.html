<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLC Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* ================= TOPBAR ================= */
.topnav {
    background: darkslategray;
    color: white;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.menu-btn {
    cursor: pointer;
    font-size: 18px;
}

/* ================= OVERLAY ================= */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    z-index: 900;
}

#overlay.show {
    display: block;
}

/* ================= SIDEBAR (FIXED HIDDEN STATE) ================= */
#sidebar {
    position: fixed;
    top: 0;
    left: -280px;   /* 👈 IMPORTANT: fully hidden */
    width: 260px;
    height: 100%;
    background: darkslategray;
    color: white;
    z-index: 1000;
    transition: left 0.3s ease;
    padding: 15px;
}

#sidebar.open {
    left: 0;
}

/* SIDEBAR HEADER */
#sidebarUser {
    text-align: center;
    padding: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

#sidebarUser img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
}

/* SIDEBAR LINKS */
#sidebar a {
    display: block;
    padding: 12px;
    color: white;
    text-decoration: none;
    cursor: pointer;
}

#sidebar a:hover {
    background: rgba(255,255,255,0.1);
}

/* ================= MAIN ================= */
.main {
    padding: 20px;
}

/* CARD */
.column {
    max-width: 800px;
    margin: 15px auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* USER BUTTONS */
.usr-row {
    display: flex;
    gap: 10px;
}

.usr-btn {
    padding: 10px;
    background: darkslategray;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
}

/* BUTTON */
.logout-btn {
    padding: 8px 15px;
    border: none;
    background: darkslategray;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- TOP NAV -->
<div class="topnav">
    <span class="menu-btn" onclick="openSidebar()">☰ Menu</span>
    <span>TLC Dashboard</span>
</div>

<!-- OVERLAY -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar">

    <div id="sidebarUser">
        <img src="https://i.pravatar.cc/100">
        <p>Loading...</p>
    </div>

    <a onclick="navigate('dashboard')">Dashboard</a>
    <a onclick="navigate('legal')">Legal</a>
    <a onclick="logout()">Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main" id="backend-v2"></div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(function () {

    const supabaseUrl = "https://bcluaogmfvweeggfctio.supabase.co";
    const supabaseKey = "YOUR_ANON_KEY";

    const client = supabase.createClient(supabaseUrl, supabaseKey);

    const container = document.getElementById("backend-v2");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const sidebarUser = document.getElementById("sidebarUser");

    // ================= USER MAP =================
    const names = {
        "chad@tlc.inc": "Chad",
        "terri@tlc.inc": "Terri",
        "dvr@tlc.inc": "Developer"
    };

    const imgs = {
        "chad@tlc.inc": "https://i.pravatar.cc/100?img=32",
        "terri@tlc.inc": "https://i.pravatar.cc/100?img=47",
        "dvr@tlc.inc": "https://i.pravatar.cc/100?img=12"
    };

    let userEmail = null;

    // ================= AUTH =================
    async function init() {

        const { data } = await client.auth.getUser();

        if (!data.user) {
            window.location.href = "../index.html";
            return;
        }

        userEmail = data.user.email;

        sidebarUser.innerHTML = `
            <img src="${imgs[userEmail] || 'https://i.pravatar.cc/100'}">
            <p>${names[userEmail] || userEmail.split("@")[0]}</p>
        `;

        router();
    }

    // ================= SIDEBAR CONTROL =================
    window.openSidebar = function () {
        sidebar.classList.add("open");
        overlay.classList.add("show");
    };

    window.closeSidebar = function () {
        sidebar.classList.remove("open");
        overlay.classList.remove("show");
    };

    // ================= LOGOUT =================
    window.logout = async function () {
        await client.auth.signOut();
        window.location.href = "../index.html";
    };

    // ================= ROUTER =================
    function router() {
        const page = location.hash.replace("#", "") || "dashboard";

        if (page === "legal") renderLegal();
        else renderDashboard();
    }

    window.navigate = function (p) {
        location.hash = p;
        closeSidebar();
    };

    // ================= DASHBOARD =================
    function renderDashboard() {

        container.innerHTML = `
            <div class="column">
                <h2>Dashboard</h2>
                <p>Welcome ${names[userEmail] || "User"}</p>

                <button class="logout-btn" onclick="logout()">Logout</button>
                <button class="logout-btn" onclick="openSidebar()">Menu</button>
            </div>
        `;
    }

    // ================= LEGAL =================
    function renderLegal() {

        container.innerHTML = `
            <div class="column">
                <h2>Legal</h2>
                <div id="tos">Loading...</div>

                <button class="logout-btn" onclick="logout()">Logout</button>
                <button class="logout-btn" onclick="openSidebar()">Menu</button>
            </div>
        `;

        fetch("https://dvr-properties-ghe.github.io/TLC-AAB-NewSite/tos.txt")
            .then(r => r.text())
            .then(t => document.getElementById("tos").textContent = t);
    }

    // ================= START =================
    window.addEventListener("hashchange", router);
    init();

})();
</script>

</body>
</html>
