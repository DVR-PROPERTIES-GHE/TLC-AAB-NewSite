<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TLC Login</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  background: #f5f5f5;
}

/* LOGIN CARD */
form {
  background: white;
  padding: 25px;
  border-radius: 10px;
  width: 320px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 10px;
  background: darkslategray;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:disabled {
  opacity: 0.6;
}

/* ========================= */
/* SIDEBAR SYSTEM (FIXED)    */
/* ========================= */

#sidebar {
  position: fixed;
  top: 0;
  left: -280px; /* 👈 HIDDEN BY DEFAULT */
  width: 260px;
  height: 100%;
  background: darkslategray;
  color: white;
  z-index: 1000;
  transition: left 0.3s ease;
  padding: 15px;
}

#sidebar.open {
  left: 0; /* 👈 SHOW ONLY WHEN OPEN */
}

/* DARK OVERLAY */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  z-index: 999;
}

#overlay.show {
  display: block;
}

/* SIDEBAR HEADER */
#sidebarUser {
  text-align: center;
  padding: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

#sidebarUser img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
}

/* LINKS */
#sidebar a {
  display: block;
  padding: 12px;
  color: white;
  text-decoration: none;
  cursor: pointer;
}

#sidebar a:hover {
  background: rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<!-- SIDEBAR (hidden on login page but ready for dashboard reuse) -->
<div id="sidebar">
  <div id="sidebarUser">
    <img src="https://i.pravatar.cc/100">
    <p>Loading...</p>
  </div>

  <a>Dashboard</a>
  <a>Legal</a>
  <a onclick="logout()">Logout</a>
</div>

<!-- OVERLAY -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- LOGIN FORM -->
<form id="login-form">
  <h2>Login</h2>

  <label>Username</label>
  <input id="username" type="text" placeholder="Enter username" required>

  <label>Password</label>
  <input id="password" type="password" placeholder="Enter password" required>

  <button id="login-btn" type="submit">Sign In</button>
</form>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://bcluaogmfvweeggfctio.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjbHVhb2dtZnZ3ZWVnZ2ZjdGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjQxNDksImV4cCI6MjA5MTQ0MDE0OX0.OfYFi5RWWym7b8Puw7x4PpzbQvK8BahINKH6Uu_CQxc";

const client = supabase.createClient(supabaseUrl, supabaseKey);

const form = document.getElementById("login-form");
const btn = document.getElementById("login-btn");

const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

function openSidebar() {
  sidebar.classList.add("open");
  overlay.classList.add("show");
}

function closeSidebar() {
  sidebar.classList.remove("open");
  overlay.classList.remove("show");
}

function logout() {
  window.location.href = "../index.html";
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  // 🔥 convert username → email
  const email = username.toLowerCase() + "@tlc.inc";

  btn.disabled = true;
  btn.textContent = "Logging in...";

  try {
    const { data, error } = await client.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      alert("Login failed: " + error.message);
      btn.disabled = false;
      btn.textContent = "Sign In";
      return;
    }

    // success → go to dashboard
    window.location.href = "./Admin/index.html";

  } catch (err) {
    alert("Unexpected error");
    btn.disabled = false;
    btn.textContent = "Sign In";
  }
});
</script>

</body>
</html>
