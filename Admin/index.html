<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TLC Role SPA System</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    left: 0;
    top: 0;
    height: 100%;
    width: 220px;
    background: darkslategray;
    display: flex;
    flex-direction: column;
    color: white;
}

/* USER HEADER */
.sidebar-user {
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

.sidebar-user img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid white;
}

.sidebar-user h3 {
    margin: 5px 0 0 0;
}

/* NAV */
.sidebar a {
    color: white;
    padding: 14px;
    text-decoration: none;
    cursor: pointer;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.1);
}

/* MAIN */
.main {
    margin-left: 220px;
    padding: 20px;
}

/* CARDS */
.column {
    max-width: 800px;
    width: 100%;
    margin: 10px auto;
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* USER BUTTONS */
.usr-row {
    display: flex;
    gap: 10px;
}

.usr-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid darkslategray;
    cursor: pointer;
}

.usr-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BUTTON */
.logout-btn {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    border-radius: 6px;
    background: darkslategray;
    color: white;
    cursor: pointer;
}

/* BLOCK */
.blocked {
    text-align: center;
    padding: 80px;
}
</style>
</head>

<body>

<div class="sidebar">

    <div class="sidebar-user" id="sidebarUser"></div>

    <a onclick="navigate('dashboard')">Dashboard</a>
    <a onclick="navigate('legal')">Legal</a>

    <!-- DEV ONLY TAB -->
    <a onclick="navigate('dev')" id="devTab">Developer Info</a>

    <a onclick="logout()">Logout</a>
</div>

<div class="main" id="app"></div>

<script>
(function () {

    const app = document.getElementById("app");
    const sidebarUser = document.getElementById("sidebarUser");
    const devTab = document.getElementById("devTab");

    // ===== USERS =====
    const users = {
        DVR: { name: "Developer", role: "dev", img: "https://i.pravatar.cc/100?img=12" },
        "TLC-Chad": { name: "Chad", role: "admin", img: "https://i.pravatar.cc/100?img=32" },
        "TLC-Terri": { name: "Terri", role: "admin", img: "https://i.pravatar.cc/100?img=47" },
        NewUser: { name: "New", role: "blocked", img: "https://i.pravatar.cc/100?img=5" }
    };

    // ===== SESSION =====
    function getSession() {
        const raw = document.cookie.split("; ")
            .find(r => r.startsWith("session="))
            ?.split("=")[1];

        if (!raw) return null;

        try {
            const [u, exp] = atob(raw).split("|");
            if (Date.now() > +exp) return null;
            return u;
        } catch {
            return null;
        }
    }

    function setSession(u) {
        document.cookie =
            "session=" + btoa(u + "|" + (Date.now() + 3600000)) +
            "; path=/";
    }

    function logout() {
        document.cookie = "session=; path=/; max-age=0";
        location.reload();
    }

    function getUser() {
        return getSession();
    }

    // ===== SIDEBAR =====
    function renderSidebar(user) {
        const u = users[user];

        sidebarUser.innerHTML = `
            <img src="${u.img}">
            <h3>${u.name}</h3>
        `;

        // DEV TAB ONLY FOR DEV
        devTab.style.display = (u.role === "dev") ? "block" : "none";
    }

    // ===== BLOCK =====
    function blocked() {
        app.innerHTML = `
            <div class="blocked">
                <h2>Access Denied</h2>
                <p>This account cannot access this system.</p>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        `;
    }

    // ===== PAGES =====
    function dashboard(user) {
        const u = users[user];

        app.innerHTML = `
            <div class="column">
                <h2>Dashboard</h2>
                <p>Welcome ${u.name}</p>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>

            <div class="column">
                <h3>User Switch</h3>
                <div class="usr-row">
                    <div class="usr-btn" onclick="switchUser('DVR')"><img src="${users.DVR.img}"></div>
                    <div class="usr-btn" onclick="switchUser('TLC-Chad')"><img src="${users["TLC-Chad"].img}"></div>
                    <div class="usr-btn" onclick="switchUser('TLC-Terri')"><img src="${users["TLC-Terri"].img}"></div>
                    <div class="usr-btn" onclick="switchUser('NewUser')"><img src="${users.NewUser.img}"></div>
                </div>
            </div>
        `;
    }

    function legal(user) {
        const u = users[user];

        app.innerHTML = `
            <div class="column">
                <h2>Legal</h2>
                <p>${u.name}</p>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>

            <div class="column">
                <h3>Terms of Service</h3>
                <div id="tos">Loading...</div>
            </div>
        `;

        fetch("https://dvr-properties-ghe.github.io/TLC-AAB-NewSite/tos.txt")
            .then(r => r.text())
            .then(t => document.getElementById("tos").textContent = t);
    }

    function dev(user) {
        const u = users[user];

        if (u.role !== "dev") {
            app.innerHTML = `
                <div class="blocked">
                    <h2>Developer Access Only</h2>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            `;
            return;
        }

        app.innerHTML = `
            <div class="column">
                <h2>Developer Info</h2>
                <p>System Version: 1.0 SPA</p>
                <p>User: ${u.name}</p>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        `;
    }

    // ===== ROUTER =====
    function navigate(page) {
        location.hash = page;
    }

    function router() {

        const user = getUser();

        if (!user) return logout();

        const u = users[user];

        if (u.role === "blocked") {
            blocked();
            return;
        }

        renderSidebar(user);

        const page = location.hash.replace("#", "") || "dashboard";

        if (page === "legal") legal(user);
        else if (page === "dev") dev(user);
        else dashboard(user);
    }

    // ===== GLOBALS =====
    window.switchUser = function (u) {
        setSession(u);
        router();
    };

    window.logout = logout;
    window.navigate = navigate;

    if (!getSession()) setSession("DVR");

    window.addEventListener("hashchange", router);
    router();

})();
</script>

</body>
</html>
