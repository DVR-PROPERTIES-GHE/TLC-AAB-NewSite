<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLC Supabase Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* TOPBAR */
.topnav {
    background: darkslategray;
    color: white;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.menu-btn {
    cursor: pointer;
}

/* OVERLAY */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    z-index: 5;
}

/* SIDEBAR */
#sidebar {
    position: fixed;
    top: 0;
    left: -260px;
    width: 260px;
    height: 100%;
    background: darkslategray;
    color: white;
    z-index: 10;
    transition: 0.3s;
    padding: 15px;
}

#sidebar.open { left: 0; }

#sidebarUser {
    text-align: center;
    padding: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

#sidebarUser img {
    width: 65px;
    height: 65px;
    border-radius: 50%;
}

#sidebar a {
    display: block;
    padding: 12px;
    cursor: pointer;
    color: white;
    text-decoration: none;
}

#sidebar a:hover {
    background: rgba(255,255,255,0.1);
}

/* MAIN */
.main {
    padding: 20px;
}

/* CARD */
.column {
    max-width: 800px;
    margin: 15px auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* USER SWITCH */
.usr-row {
    display: flex;
    gap: 10px;
}

.usr-btn {
    padding: 10px;
    background: darkslategray;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
}

/* BUTTON */
.logout-btn {
    padding: 8px 15px;
    border: none;
    background: darkslategray;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
}

/* BLOCK SCREEN */
.blocked {
    text-align: center;
    padding: 80px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topnav">
    <span class="menu-btn" onclick="openSidebar()">☰ Menu</span>
    <span>TLC Dashboard</span>
</div>

<!-- OVERLAY -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar">

    <div id="sidebarUser"></div>

    <a onclick="navigate('dashboard')">Dashboard</a>
    <a onclick="navigate('legal')">Legal</a>
    <a id="devTab" onclick="navigate('dev')" style="display:none;">Developer</a>
    <a onclick="logout()">Logout</a>
</div>

<!-- MAIN -->
<div class="main" id="backend-v2"></div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(function () {

    const supabaseUrl = "https://bcluaogmfvweeggfctio.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjbHVhb2dtZnZ3ZWVnZ2ZjdGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjQxNDksImV4cCI6MjA5MTQ0MDE0OX0.OfYFi5RWWym7b8Puw7x4PpzbQvK8BahINKH6Uu_CQxc";

    const client = supabase.createClient(supabaseUrl, supabaseKey);

    const container = document.getElementById("backend-v2");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const sidebarUser = document.getElementById("sidebarUser");
    const devTab = document.getElementById("devTab");

    // ================= USER ROLE MAP =================
    const roles = {
        "chad@tlc.inc": "admin",
        "terri@tlc.inc": "admin",
        "dvr@tlc.inc": "dev"
    };

    const names = {
        "chad@tlc.inc": "Chad",
        "terri@tlc.inc": "Terri",
        "dvr@tlc.inc": "Developer"
    };

    const imgs = {
        "chad@tlc.inc": "https://i.pravatar.cc/100?img=32",
        "terri@tlc.inc": "https://i.pravatar.cc/100?img=47",
        "dvr@tlc.inc": "https://i.pravatar.cc/100?img=12"
    };

    let userEmail = null;

    // ================= AUTH CHECK =================
    async function init() {

        const { data } = await client.auth.getUser();

        if (!data.user) {
            window.location.href = "../index.html";
            return;
        }

        userEmail = data.user.email;

        renderSidebar();
        router();
    }

    // ================= SIDEBAR =================
    function renderSidebar() {

        sidebarUser.innerHTML = `
            <img src="${imgs[userEmail] || 'https://i.pravatar.cc/100'}">
            <h3>${names[userEmail] || userEmail.split("@")[0]}</h3>
        `;

        if (roles[userEmail] === "dev") {
            devTab.style.display = "block";
        }
    }

    // ================= SIDEBAR CONTROLS =================
    window.openSidebar = () => {
        sidebar.classList.add("open");
        overlay.style.display = "block";
    };

    window.closeSidebar = () => {
        sidebar.classList.remove("open");
        overlay.style.display = "none";
    };

    // ================= LOGOUT =================
    window.logout = async () => {
        await client.auth.signOut();
        window.location.href = "../index.html";
    };

    // ================= ROUTER =================
    function router() {

        const page = location.hash.replace("#", "") || "dashboard";

        if (page === "legal") renderLegal();
        else if (page === "dev") renderDev();
        else renderDashboard();
    }

    window.navigate = function (p) {
        location.hash = p;
        closeSidebar();
    };

    // ================= DASHBOARD =================
    function renderDashboard() {

        container.innerHTML = `
            <div class="column">
                <h2>Dashboard</h2>
                <p>Welcome ${names[userEmail] || "User"}</p>
                <button class="logout-btn" onclick="logout()">Logout</button>
                <button class="logout-btn" onclick="openSidebar()">Menu</button>
            </div>

            <div class="column">
                <h3>User Switch (demo)</h3>

                <div class="usr-row">
                    <div class="usr-btn" onclick="switchUser('chad@tlc.inc')">Chad</div>
                    <div class="usr-btn" onclick="switchUser('terri@tlc.inc')">Terri</div>
                    <div class="usr-btn" onclick="switchUser('dvr@tlc.inc')">Dev</div>
                </div>

                <p style="font-size:12px;">(Only works if those accounts exist in Supabase)</p>
            </div>
        `;
    }

    // ================= LEGAL =================
    function renderLegal() {

        container.innerHTML = `
            <div class="column">
                <h2>Legal</h2>
                <div id="tos">Loading...</div>
                <button class="logout-btn" onclick="logout()">Logout</button>
                <button class="logout-btn" onclick="openSidebar()">Menu</button>
            </div>
        `;

        fetch("https://dvr-properties-ghe.github.io/TLC-AAB-NewSite/tos.txt")
            .then(r => r.text())
            .then(t => document.getElementById("tos").textContent = t);
    }

    // ================= DEV =================
    function renderDev() {

        if (roles[userEmail] !== "dev") return;

        container.innerHTML = `
            <div class="column">
                <h2>Developer Panel</h2>
                <p>System Online</p>
                <button class="logout-btn" onclick="logout()">Logout</button>
                <button class="logout-btn" onclick="openSidebar()">Menu</button>
            </div>
        `;
    }

    // ================= SWITCH USER (OPTIONAL DEMO) =================
    window.switchUser = async function (email) {
        alert("Switching users requires real login. Please log out and log back in.");
    };

    // ================= INIT =================
    window.addEventListener("hashchange", router);

    init();

})();
</script>

</body>
</html>
