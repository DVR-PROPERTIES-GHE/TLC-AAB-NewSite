<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="https://cdn0.iconfinder.com/data/icons/social-glyph/30/tumblr-60.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLC Admin Dashboard</title>
<style>
body {
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
}
.header {
    background-color: lightgray;
    padding: 30px 10px;
}
.header h2 {
    margin: 10px 0;
    font-size: 32px;
}
.topnav {
    background-color: darkslategray;
    padding: 8px 0;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}
.link-topnav {
    color: whitesmoke;
    margin: 0 8px;
    text-decoration: none;
    font-size: 15px;
    padding: 4px 8px;
}
.link-topnav:hover {
    font-weight: bold;
	cursor: pointer;
}
.columns {
    display: flex;
    justify-content: center;
    padding: 20px;
    flex-wrap: wrap;
    gap: 20px;
}
.column {
    max-width: 500px;
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.V2_ImagePg {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    background-color: whitesmoke;
    padding: 20px;
    width: 100%;
}
.V2_Img {
    min-height: 48px;
    min-width: 48px;
    max-width: 100px;
    border-radius: 25px;
    background-color: white;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 12px;
}
.postCol {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    padding: 10px;
    max-width: 100vw;
}
.post {
    scroll-snap-align: start;
    flex: 0 0 auto;
    width: 90vw;
    max-width: 500px;
    background: white;
    border-radius: 25px;
    padding: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.fb-frame {
    width: 100%;
    aspect-ratio: 9 / 16;
    border: none;
}
.logout-btn {
    margin-top: 15px;
    padding: 8px 15px;
    border: none;
    border-radius: 6px;
    background-color: darkslategray;
    color: white;
    cursor: pointer;
}
.logout-btn:hover {
    background-color: black;
}
</style>
</head>
<body>

<div class="header">
    <h2>TLC Admin Dashboard</h2>
</div>

<div class="topnav" id="topnav">
    <a class="link-topnav" href="">Home</a>
    <a class="link-topnav" href="legaladmin.html">Legal</a>
    <a class="link-topnav" href="#">Posts</a>
    <a class="link-topnav" href="#">Settings</a>
	<a class="link-topnav" id="logout-btn">Logout</a>
</div>

<section id="backend-v2" class="columns"></section>
<script src="dashboard.js"></script>

</body>
</html>
