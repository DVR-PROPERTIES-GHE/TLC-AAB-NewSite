<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="https://cdn0.iconfinder.com/data/icons/social-glyph/30/tumblr-60.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLC Admin Dashboard</title>
<style>
/* GLOBAL BODY */
body {
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
}

/* HEADER */
.header {
    background-color: lightgray;
    padding: 30px 10px;
}

.header h2 {
    margin: 10px 0;
    font-size: 32px;
}

/* NAVIGATION */
.topnav {
    background-color: darkslategray;
    padding: 8px 0;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.link-topnav {
    color: whitesmoke;
    margin: 0 8px;
    text-decoration: none;
    font-size: 15px;
    padding: 4px 8px;
}

.link-topnav:hover {
    font-weight: bold;
	cursor: pointer;
}

/* COLUMNS */
.columns {
    display: flex;
    justify-content: center;
    padding: 20px;
    flex-wrap: wrap;
    gap: 20px;
}

.column {
    max-width: 500px;
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* IMAGE SCROLLER */
.V2_ImagePg {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    background-color: whitesmoke;
    padding: 20px;
    width: 100%;
}

.V2_Img {
    min-height: 48px;
    min-width: 48px;
    max-width: 100px;
    border-radius: 25px;
    background-color: white;
}

.usr-btn {
    background-color: white;
    text-align: center;
    border-radius: 50%;
    padding: 10px;
    cursor: pointer;
}

.usr-btn:hover {
    background-color: whitesmoke;
    border: 1px solid black;
}

/* POST SCROLLER */
.postCol {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    padding: 10px;
    max-width: 100vw;
}

.post {
    scroll-snap-align: start;
    flex: 0 0 auto;
    width: 90vw;
    max-width: 500px;
    background: white;
    border-radius: 25px;
    padding: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.fb-frame {
    width: 100%;
    aspect-ratio: 9 / 16;
    border: none;
}

/* MOBILE FIXES */
@media (max-width: 600px) {
    .header h2 { font-size: 26px; }
    .topnav { font-size: 14px; }
    .postCol { padding: 10px; gap: 20px; }
}

</style>
</head>
<body>

<div class="header">
    <h2>TLC Admin Dashboard</h2>
</div>

<div class="topnav">
    <a class="link-topnav" href="#">Home</a>
    <a class="link-topnav" href="#">Users</a>
    <a class="link-topnav" href="#">Posts</a>
    <a class="link-topnav" href="#">Settings</a>
	<a class="link-topnav" id="logout-btn">Logout</a>
</div>

<section id="backend-v2" class="columns">
    <!-- Dynamic content will be injected here -->
</section>

<script>
(function () {
    const container = document.getElementById('backend-v2');

    function getCookie(name) {
        const cookies = document.cookie.split("; ");
        for (let c of cookies) {
            const [key, value] = c.split("=");
            if (key === name) return value;
        }
        return null;
    }

    function setSession(username) {
        const expiry = Date.now() + (60 * 60 * 1000); // 1 hour
        const sessionData = btoa(username + "|" + expiry);
        document.cookie = "session=" + sessionData + "; path=/";
    }

    function deleteSession() {
        document.cookie = "session=; path=/; max-age=0";
    }

    function redirectHome() {
        window.location.href = "../index.html";
    }

    const raw = getCookie("session");
    if (!raw) {
        redirectHome();
        return;
    }

    // Map of usernames to friendly display names
    const usernameMap = {
        "DVR": "Ethan",
        "TLC-Chad": "Chad",
        "TLC-Terri": "Terri",
        "NewUser": "Unknown"
    };

    function renderDashboard(username) {
        const displayName = usernameMap[username] || username;

        container.innerHTML = `
            <div class="column">
                <h3>Welcome, ${displayName}</h3>
                <p>You are logged in.</p>
            </div>
            <div class="column V2_ImagePg">
                <div class="V2_Img usr-btn" data-user="DVR">Dev</div>
                <div class="V2_Img usr-btn" data-user="TLC-Chad">Chad</div>
                <div class="V2_Img usr-btn" data-user="TLC-Terri">Terri</div>
                <div class="V2_Img usr-btn" data-user="NewUser">___</div>
            </div>
            <div class="column postCol">
                <div class="post roundcorner">
                    <iframe class="fb-frame" src="https://www.facebook.com/plugins/post.php?href=https%3A%2F%2Fwww.facebook.com%2FFacebookDevelopers%2Fposts%2F10151471074398553&width=500" scrolling="no"></iframe>
                </div>
                <div class="post roundcorner">
                    <iframe class="fb-frame" src="https://www.facebook.com/plugins/post.php?href=https%3A%2F%2Fwww.facebook.com%2FFacebookDevelopers%2Fposts%2F10151471074398553&width=500" scrolling="no"></iframe>
                </div>
            </div>
        `;

        // Logout button
        document.getElementById("logout-btn").addEventListener("click", function () {
            deleteSession();
            redirectHome();
        });

        // User buttons: switch account
        const userBtns = container.querySelectorAll(".usr-btn");
        userBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                const newUser = btn.dataset.user;
                setSession(newUser);
                renderDashboard(newUser); // re-render with new user
            });
        });
    }

    try {
        const [user, expiry] = atob(raw).split("|");
        if (Date.now() > parseInt(expiry)) {
            deleteSession();
            redirectHome();
            return;
        }

        renderDashboard(user);

    } catch(e) {
        deleteSession();
        redirectHome();
    }
})();
</script>

</body>
</html>
