<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TLC Admin Panel</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* TOP NAV */
.topnav {
    background: darkslategray;
    color: white;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* MENU BUTTON */
.menu-btn {
    cursor: pointer;
    font-size: 18px;
}

/* OVERLAY */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    z-index: 5;
}

/* SIDEBAR */
#sidebar {
    position: fixed;
    top: 0;
    left: -260px;
    width: 260px;
    height: 100%;
    background: darkslategray;
    color: white;
    z-index: 10;
    transition: 0.3s ease;
    padding: 15px;
}

#sidebar.open {
    left: 0;
}

#sidebarUser {
    text-align: center;
    padding: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

#sidebarUser img {
    width: 65px;
    height: 65px;
    border-radius: 50%;
}

#sidebar a {
    display: block;
    padding: 12px;
    cursor: pointer;
    color: white;
    text-decoration: none;
}

#sidebar a:hover {
    background: rgba(255,255,255,0.1);
}

/* MAIN */
.main {
    padding: 20px;
}

/* CARD */
.column {
    max-width: 800px;
    margin: 15px auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* USER BUTTONS */
.usr-row {
    display: flex;
    gap: 10px;
}

.usr-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid darkslategray;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
}

/* BUTTONS */
.logout-btn {
    padding: 8px 15px;
    border: none;
    background: darkslategray;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
}

/* BLOCK SCREEN */
.blocked {
    text-align: center;
    padding: 80px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topnav">
    <span class="menu-btn" onclick="openSidebar()">☰ Menu</span>
    <span>TLC Admin System</span>
</div>

<!-- OVERLAY -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar">

    <div id="sidebarUser"></div>

    <a onclick="navigate('dashboard')">Dashboard</a>
    <a onclick="navigate('legal')">Legal</a>
    <a id="devTab" onclick="navigate('dev')" style="display:none;">Developer Info</a>
    <a onclick="logout()">Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main" id="backend-v2"></div>

<script>
(function () {

    const container = document.getElementById("backend-v2");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const sidebarUser = document.getElementById("sidebarUser");
    const devTab = document.getElementById("devTab");

    // ================= COOKIE =================
    function getCookie(name) {
        const cookies = document.cookie.split("; ");
        for (let c of cookies) {
            const [key, value] = c.split("=");
            if (key === name) return value;
        }
        return null;
    }

    function deleteSession() {
        document.cookie = "session=; path=/; max-age=0";
        window.location.href = "../index.html";
    }

    // ================= USERS =================
    const usernameMap = {
        DVR: "Developer",
        "TLC-Chad": "Chad",
        "TLC-Terri": "Terri",
        NewUser: "NewUser"
    };

    const userImgs = {
        DVR: "https://i.pravatar.cc/100?img=12",
        "TLC-Chad": "https://i.pravatar.cc/100?img=32",
        "TLC-Terri": "https://i.pravatar.cc/100?img=47",
        NewUser: "https://i.pravatar.cc/100?img=5"
    };

    const roles = {
        DVR: "dev",
        "TLC-Chad": "admin",
        "TLC-Terri": "admin",
        NewUser: "blocked"
    };

    // ================= SESSION =================
    const raw = getCookie("session");

    if (!raw) window.location.href = "../index.html";

    let currentUser;

    try {
        const [user, expiry] = atob(raw).split("|");

        if (Date.now() > +expiry) {
            deleteSession();
            return;
        }

        currentUser = user;

    } catch {
        deleteSession();
        return;
    }

    // ================= BLOCK =================
    if (roles[currentUser] === "blocked") {
        container.innerHTML = `
            <div class="column blocked">
                <h2>Access Denied</h2>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        `;
        window.logout = deleteSession;
        return;
    }

    // ================= SIDEBAR =================
    function openSidebar() {
        sidebar.classList.add("open");
        overlay.style.display = "block";
    }

    function closeSidebar() {
        sidebar.classList.remove("open");
        overlay.style.display = "none";
    }

    function updateSidebar() {
        sidebarUser.innerHTML = `
            <img src="${userImgs[currentUser]}">
            <h3>${usernameMap[currentUser]}</h3>
        `;

        if (currentUser === "DVR") {
            devTab.style.display = "block";
        }
    }

    // ================= DASHBOARD =================
    function dashboard() {

        updateSidebar();

        container.innerHTML = `
            <div class="column">
                <h2>Dashboard</h2>
                <p>Welcome ${usernameMap[currentUser]}</p>
                <button class="logout-btn" onclick="logout()">Logout</button>
                <button class="logout-btn" onclick="openSidebar()">Menu</button>
            </div>

            <div class="column">
                <h3>Switch User</h3>
                <div class="usr-row">

                    <div class="usr-btn" onclick="switchUser('TLC-Chad')">Chad</div>
                    <div class="usr-btn" onclick="switchUser('TLC-Terri')">Terri</div>
                    <div class="usr-btn" onclick="switchUser('DVR')">Dev</div>

                </div>
            </div>
        `;
    }

    // ================= LEGAL =================
    function legal() {

        updateSidebar();

        container.innerHTML = `
            <div class="column">
                <h2>Legal</h2>
                <div id="tos">Loading...</div>
                <button class="logout-btn" onclick="logout()">Logout</button>
                <button class="logout-btn" onclick="openSidebar()">Menu</button>
            </div>
        `;

        fetch("https://dvr-properties-ghe.github.io/TLC-AAB-NewSite/tos.txt")
            .then(r => r.text())
            .then(t => document.getElementById("tos").textContent = t);
    }

    // ================= DEV =================
    function dev() {

        if (currentUser !== "DVR") return;

        container.innerHTML = `
            <div class="column">
                <h2>Developer Info</h2>
                <p>System Active</p>
                <button class="logout-btn" onclick="logout()">Logout</button>
                <button class="logout-btn" onclick="openSidebar()">Menu</button>
            </div>
        `;
    }

    // ================= ROUTER =================
    function router() {

        const page = location.hash.replace("#", "") || "dashboard";

        if (page === "legal") legal();
        else if (page === "dev") dev();
        else dashboard();
    }

    // ================= GLOBALS =================
    window.logout = deleteSession;
    window.openSidebar = openSidebar;
    window.closeSidebar = closeSidebar;

    window.navigate = function (p) {
        location.hash = p;
        closeSidebar();
    };

    window.switchUser = function (u) {
        const expiry = Date.now() + (60 * 60 * 1000);
        document.cookie = "session=" + btoa(u + "|" + expiry) + "; path=/";
        location.reload();
    };

    window.addEventListener("hashchange", router);

    router();

})();
</script>

</body>
</html>
