<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TLC SPA System</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    left: 0;
    top: 0;
    height: 100%;
    width: 200px;
    background: darkslategray;
    padding-top: 20px;
    display: flex;
    flex-direction: column;
}

.sidebar a {
    color: white;
    padding: 15px;
    text-decoration: none;
    cursor: pointer;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.1);
}

/* MAIN CONTENT */
.main {
    margin-left: 200px;
    padding: 20px;
}

/* CARDS */
.column {
    max-width: 800px;
    width: 100%;
    margin: 10px auto;
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* USER ICON */
.V2_Img {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: darkslategray;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

/* BUTTON */
.logout-btn {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    border-radius: 6px;
    background: darkslategray;
    color: white;
    cursor: pointer;
}

/* USER SWITCH */
.usr-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.usr-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: white;
    border: 2px solid darkslategray;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

/* BLOCK SCREEN */
.blocked {
    text-align: center;
    padding: 80px;
}

/* MOBILE */
@media (max-width: 700px) {
    .sidebar {
        width: 100px;
    }

    .main {
        margin-left: 100px;
    }

    .sidebar a {
        font-size: 12px;
        padding: 10px;
    }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <a onclick="navigate('dashboard')">Dashboard</a>
    <a onclick="navigate('legal')">Legal</a>
    <a onclick="logout()">Logout</a>
</div>

<!-- MAIN APP -->
<div class="main" id="app"></div>

<script>
(function () {

    const app = document.getElementById("app");

    const usernameMap = {
        DVR: "Dev",
        "TLC-Chad": "Chad",
        "TLC-Terri": "Terri",
        NewUser: "NewUser"
    };

    // ========= SESSION =========
    function getSession() {
        const raw = document.cookie.split("; ")
            .find(r => r.startsWith("session="))
            ?.split("=")[1];

        if (!raw) return null;

        try {
            const [u, exp] = atob(raw).split("|");
            if (Date.now() > +exp) return null;
            return u;
        } catch {
            return null;
        }
    }

    function setSession(u) {
        document.cookie =
            "session=" + btoa(u + "|" + (Date.now() + 3600000)) +
            "; path=/";
    }

    function deleteSession() {
        document.cookie = "session=; path=/; max-age=0";
        location.reload();
    }

    function getUser() {
        return getSession();
    }

    // ========= BLOCK SCREEN =========
    function blockedScreen() {
        app.innerHTML = `
            <div class="blocked">
                <h2>Access Denied</h2>
                <p>This account is restricted.</p>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        `;
    }

    // ========= PAGES =========
    function dashboard() {

        const user = getUser();
        const name = usernameMap[user] || user;

        app.innerHTML = `

            <div class="column">
                <div style="display:flex; gap:15px; align-items:center;">
                    <div class="V2_Img">${name}</div>
                    <div>
                        <h3 style="margin:0;">${name}</h3>
                        <p style="margin:0;">Dashboard</p>
                    </div>
                </div>

                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>

            <div class="column">
                <h3>User Switch</h3>
                <div class="usr-row">
                    <div class="usr-btn" onclick="switchUser('DVR')">D</div>
                    <div class="usr-btn" onclick="switchUser('TLC-Chad')">C</div>
                    <div class="usr-btn" onclick="switchUser('TLC-Terri')">T</div>
                    <div class="usr-btn" onclick="switchUser('NewUser')">N</div>
                </div>
            </div>

            <div class="column">
                Welcome to the dashboard.
            </div>
        `;
    }

    function legal() {

        const user = getUser();
        const name = usernameMap[user] || user;

        app.innerHTML = `

            <div class="column">
                <div style="display:flex; gap:15px; align-items:center;">
                    <div class="V2_Img">${name}</div>
                    <div>
                        <h3 style="margin:0;">${name}</h3>
                        <p style="margin:0;">Legal</p>
                    </div>
                </div>

                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>

            <div class="column">
                <h3>Terms of Service</h3>
                <div id="tos">Loading...</div>
            </div>
        `;

        fetch("https://dvr-properties-ghe.github.io/TLC-AAB-NewSite/tos.txt")
            .then(r => r.text())
            .then(t => {
                document.getElementById("tos").textContent = t;
            });
    }

    // ========= ROUTER =========
    function navigate(page) {
        location.hash = page;
    }

    function router() {

        const user = getSession();

        // 🚨 BLOCK NEWUSER COMPLETELY
        if (user === "NewUser") {
            blockedScreen();
            return;
        }

        const page = location.hash.replace("#", "") || "dashboard";

        if (page === "legal") legal();
        else dashboard();
    }

    // ========= GLOBALS =========
    window.switchUser = function (u) {

        if (u === "NewUser") {
            setSession("NewUser");
            router();
            return;
        }

        setSession(u);
        router();
    };

    window.logout = function () {
        deleteSession();
    };

    window.navigate = navigate;

    // ========= INIT =========
    if (!getSession()) {
        setSession("DVR");
    }

    window.addEventListener("hashchange", router);
    router();

})();
</script>

</body>
</html>
