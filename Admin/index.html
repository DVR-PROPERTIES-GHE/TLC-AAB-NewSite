<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TLC Drawer SPA</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* TOP BAR */
.topnav {
    background: darkslategray;
    color: white;
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.menu-btn {
    cursor: pointer;
    font-size: 18px;
}

/* DIM BACKDROP */
#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    z-index: 5;
}

/* SIDEBAR DRAWER */
.sidebar {
    position: fixed;
    top: 0;
    left: -260px;
    width: 260px;
    height: 100%;
    background: darkslategray;
    color: white;
    transition: 0.3s ease;
    z-index: 10;
    display: flex;
    flex-direction: column;
}

.sidebar.open {
    left: 0;
}

/* USER HEADER */
.sidebar-user {
    text-align: center;
    padding: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

.sidebar-user img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 2px solid white;
}

/* NAV */
.sidebar a {
    padding: 15px;
    color: white;
    text-decoration: none;
    cursor: pointer;
}
.sidebar a:hover {
    background: rgba(255,255,255,0.1);
}

/* MAIN */
.main {
    padding: 20px;
}

/* CARDS */
.column {
    max-width: 800px;
    margin: 10px auto;
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* USER SWITCH */
.usr-row {
    display: flex;
    gap: 10px;
}

.usr-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid darkslategray;
    cursor: pointer;
}

.usr-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BUTTON */
.logout-btn {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    border-radius: 6px;
    background: darkslategray;
    color: white;
    cursor: pointer;
}

/* BLOCK SCREEN */
.blocked {
    text-align: center;
    padding: 80px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topnav">
    <span class="menu-btn" onclick="openSidebar()">☰ Menu</span>
    <span>TLC SPA System</span>
</div>

<!-- OVERLAY -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

    <div class="sidebar-user" id="sidebarUser"></div>

    <a onclick="navigate('dashboard')">Dashboard</a>
    <a onclick="navigate('legal')">Legal</a>
    <a onclick="logout()">Logout</a>
</div>

<!-- MAIN -->
<div class="main" id="app"></div>

<script>
(function () {

    const app = document.getElementById("app");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const sidebarUser = document.getElementById("sidebarUser");

    // USERS
    const users = {
        DVR: { name: "Developer", role: "dev", img: "https://i.pravatar.cc/100?img=12" },
        "TLC-Chad": { name: "Chad", role: "admin", img: "https://i.pravatar.cc/100?img=32" },
        "TLC-Terri": { name: "Terri", role: "admin", img: "https://i.pravatar.cc/100?img=47" },
        NewUser: { name: "New", role: "blocked", img: "https://i.pravatar.cc/100?img=5" }
    };

    // SESSION
    function getSession() {
        const raw = document.cookie.split("; ")
            .find(r => r.startsWith("session="))
            ?.split("=")[1];

        if (!raw) return null;

        try {
            const [u, exp] = atob(raw).split("|");
            if (Date.now() > +exp) return null;
            return u;
        } catch {
            return null;
        }
    }

    function setSession(u) {
        document.cookie = "session=" + btoa(u + "|" + (Date.now() + 3600000)) + "; path=/";
    }

    function deleteSession() {
        document.cookie = "session=; path=/; max-age=0";
        location.reload();
    }

    let currentUser = getSession();
    if (!currentUser) setSession("DVR");

    currentUser = getSession();

    // BLOCK NEWUSER
    if (currentUser === "NewUser") {
        app.innerHTML = `
            <div class="blocked">
                <h2>Access Denied</h2>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        `;
    }

    function renderSidebarUser() {
        const u = users[currentUser];
        sidebarUser.innerHTML = `
            <img src="${u.img}">
            <h3>${u.name}</h3>
        `;
    }

    function openSidebar() {
        sidebar.classList.add("open");
        overlay.style.display = "block";
    }

    function closeSidebar() {
        sidebar.classList.remove("open");
        overlay.style.display = "none";
    }

    function dashboard() {

        const u = users[currentUser];

        app.innerHTML = `
            <div class="column">
                <h2>Dashboard</h2>
                <p>Welcome ${u.name}</p>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>

            <div class="column">
                <h3>User Switch</h3>
                <div class="usr-row">

                    <div class="usr-btn" onclick="switchUser('TLC-Chad')">
                        <img src="${users["TLC-Chad"].img}">
                    </div>

                    <div class="usr-btn" onclick="switchUser('TLC-Terri')">
                        <img src="${users["TLC-Terri"].img}">
                    </div>

                    <div class="usr-btn" onclick="switchUser('DVR')">
                        <img src="${users["DVR"].img}">
                    </div>

                    <div class="usr-btn" onclick="switchUser('NewUser')">
                        <img src="${users["NewUser"].img}">
                    </div>

                </div>
            </div>
        `;
    }

    function legal() {

        app.innerHTML = `
            <div class="column">
                <h2>Legal</h2>
                <div id="tos">Loading...</div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        `;

        fetch("https://dvr-properties-ghe.github.io/TLC-AAB-NewSite/tos.txt")
            .then(r => r.text())
            .then(t => document.getElementById("tos").textContent = t);
    }

    function router(page) {

        currentUser = getSession();

        renderSidebarUser();

        if (currentUser === "NewUser") return;

        if (page === "legal") legal();
        else dashboard();
    }

    // GLOBALS
    window.switchUser = function (u) {
        setSession(u);
        router(location.hash.replace("#","") || "dashboard");
    };

    window.logout = deleteSession;
    window.openSidebar = openSidebar;
    window.closeSidebar = closeSidebar;

    window.navigate = function (page) {
        location.hash = page;
        closeSidebar();
        router(page);
    };

    window.addEventListener("hashchange", () => {
        router(location.hash.replace("#","") || "dashboard");
    });

    router("dashboard");

})();
</script>

</body>
</html>
