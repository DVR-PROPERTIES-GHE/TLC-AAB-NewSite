<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLC Supabase Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    overflow-x: hidden;
}

.topnav {
    background: darkslategray;
    color: white;
    padding: 10px;
    display: flex;
    justify-content: space-between;
}

.menu-btn { cursor: pointer; }

#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    z-index: 9;
}

#sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 260px;
    height: 100%;
    background: darkslategray;
    color: white;
    z-index: 10;
    padding: 15px;
    transform: translateX(-100%);
    transition: transform 0.3s ease;
}

#sidebar.open { transform: translateX(0); }

#sidebarUser {
    text-align: center;
    padding: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

#sidebarUser img {
    width: 65px;
    height: 65px;
    border-radius: 50%;
}

#sidebar a {
    display: block;
    padding: 12px;
    cursor: pointer;
    color: white;
    text-decoration: none;
}

#sidebar a:hover {
    background: rgba(255,255,255,0.1);
}

.main { padding: 20px; }

.column {
    max-width: 900px;
    margin: 15px auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.logout-btn {
    padding: 8px 15px;
    border: none;
    background: darkslategray;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="topnav">
    <span class="menu-btn" onclick="openSidebar()">☰ Menu</span>
    <span>TLC Dashboard</span>
</div>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
    <div id="sidebarUser"></div>
    <a onclick="navigate('dashboard')">Dashboard</a>
    <a id="allLogsTab" onclick="navigate('logs')" style="display:none;">All Logins</a>
    <a onclick="navigate('legal')">Legal</a>
    <a id="devTab" onclick="navigate('dev')" style="display:none;">Developer</a>
    <a onclick="logout()">Logout</a>
</div>

<div class="main" id="backend-v2"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(function () {

    const supabaseUrl = "https://bcluaogmfvweeggfctio.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjbHVhb2dtZnZ3ZWVnZ2ZjdGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjQxNDksImV4cCI6MjA5MTQ0MDE0OX0.OfYFi5RWWym7b8Puw7x4PpzbQvK8BahINKH6Uu_CQxc";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    const container = document.getElementById("backend-v2");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const sidebarUser = document.getElementById("sidebarUser");
    const devTab = document.getElementById("devTab");
    const allLogsTab = document.getElementById("allLogsTab");

    const roles = {
        "chad@tlc.inc": "admin",
        "terri@tlc.inc": "admin",
        "dvr@tlc.inc": "dev"
    };

    const names = {
        "chad@tlc.inc": "Chad",
        "terri@tlc.inc": "Terri",
        "dvr@tlc.inc": "Developer"
    };

    const imgs = {
        "chad@tlc.inc": "https://i.pravatar.cc/100?img=32",
        "terri@tlc.inc": "https://i.pravatar.cc/100?img=47",
        "dvr@tlc.inc": "https://i.pravatar.cc/100?img=12"
    };

    let userEmail = null;

    async function init() {
        const { data } = await client.auth.getUser();

        if (!data.user) {
            window.location.href = "../index.html";
            return;
        }

        userEmail = data.user.email;

        // log login
        await client.from("login_history").insert([{ email: userEmail }]);

        sidebarUser.innerHTML = `
            <img src="${imgs[userEmail] || 'https://i.pravatar.cc/100'}">
            <h3>${names[userEmail] || userEmail.split("@")[0]}</h3>
        `;

        if (roles[userEmail] === "dev") devTab.style.display = "block";
        if (roles[userEmail] === "admin") allLogsTab.style.display = "block";

        router();
    }

    window.openSidebar = () => {
        sidebar.classList.add("open");
        overlay.style.display = "block";
    };

    window.closeSidebar = () => {
        sidebar.classList.remove("open");
        overlay.style.display = "none";
    };

    window.logout = async () => {
        await client.auth.signOut();
        window.location.href = "../index.html";
    };

    function router() {
        const page = location.hash.replace("#", "") || "dashboard";

        if (page === "logs") renderAllLogs();
        else if (page === "legal") renderLegal();
        else if (page === "dev") renderDev();
        else renderDashboard();
    }

    window.navigate = (p) => {
        location.hash = p;
        closeSidebar();
    };

    // DASHBOARD (LAST 3 LOGINS)
    async function renderDashboard() {

        container.innerHTML = `
            <div class="column">
                <h2>Dashboard</h2>
                <p>Welcome ${names[userEmail] || "User"}</p>

                ${roles[userEmail] === "admin" ? `
                    <h3>Recent Logins</h3>
                    <div id="recentLogs">Loading...</div>
                ` : ""}

                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        `;

        if (roles[userEmail] === "admin") {
            const box = document.getElementById("recentLogs");

            const { data } = await client
                .from("login_history")
                .select("email, login_time")
                .order("login_time", { ascending: false })
                .limit(3);

            box.innerHTML = data.map(row => `
                <p>${row.email} — ${new Date(row.login_time).toLocaleString()}</p>
            `).join("");
        }
    }

    // ALL LOGS PAGE
    async function renderAllLogs() {

        if (roles[userEmail] !== "admin") return;

        container.innerHTML = `
            <div class="column">
                <h2>All Login History</h2>
                <div id="allLogs">Loading...</div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        `;

        const box = document.getElementById("allLogs");

        const { data } = await client
            .from("login_history")
            .select("email, login_time")
            .order("login_time", { ascending: false });

        box.innerHTML = `
            <table style="width:100%;">
                <tr>
                    <th>Email</th>
                    <th>Time</th>
                </tr>
                ${data.map(row => `
                    <tr>
                        <td>${row.email}</td>
                        <td>${new Date(row.login_time).toLocaleString()}</td>
                    </tr>
                `).join("")}
            </table>
        `;
    }

    function renderLegal() {
        container.innerHTML = `<div class="column"><h2>Legal</h2></div>`;
    }

    function renderDev() {
        if (roles[userEmail] !== "dev") return;
        container.innerHTML = `<div class="column"><h2>Developer Panel</h2></div>`;
    }

    window.addEventListener("hashchange", router);
    init();

})();
</script>

</body>
</html>
