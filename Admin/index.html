<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="https://cdn0.iconfinder.com/data/icons/social-glyph/30/tumblr-60.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLC Admin Dashboard</title>
<style>
body {
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
}
.header {
    background-color: lightgray;
    padding: 30px 10px;
}
.header h2 {
    margin: 10px 0;
    font-size: 32px;
}
.topnav {
    background-color: darkslategray;
    padding: 8px 0;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}
.link-topnav {
    color: whitesmoke;
    margin: 0 8px;
    text-decoration: none;
    font-size: 15px;
    padding: 4px 8px;
}
.link-topnav:hover {
    font-weight: bold;
	cursor: pointer;
}
.columns {
    display: flex;
    justify-content: center;
    padding: 20px;
    flex-wrap: wrap;
    gap: 20px;
}
.column {
    max-width: 500px;
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.V2_ImagePg {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    background-color: whitesmoke;
    padding: 20px;
    width: 100%;
}
.V2_Img {
    min-height: 48px;
    min-width: 48px;
    max-width: 100px;
    border-radius: 25px;
    background-color: white;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 12px;
}
.postCol {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    padding: 10px;
    max-width: 100vw;
}
.post {
    scroll-snap-align: start;
    flex: 0 0 auto;
    width: 90vw;
    max-width: 500px;
    background: white;
    border-radius: 25px;
    padding: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.fb-frame {
    width: 100%;
    aspect-ratio: 9 / 16;
    border: none;
}
.logout-btn {
    margin-top: 15px;
    padding: 8px 15px;
    border: none;
    border-radius: 6px;
    background-color: darkslategray;
    color: white;
    cursor: pointer;
}
.logout-btn:hover {
    background-color: black;
}
</style>
</head>
<body>

<div class="header">
    <h2>TLC Admin Dashboard</h2>
</div>

<div class="topnav" id="topnav">
    <a class="link-topnav" href="">Home</a>
    <a class="link-topnav" href="../legaluser.html">Legal</a>
    <a class="link-topnav" href="#">Posts</a>
    <a class="link-topnav" href="#">Settings</a>
	<a class="link-topnav" id="logout-btn">Logout</a>
</div>

<section id="backend-v2" class="columns"></section>

<script>
(function () {
    const container = document.getElementById('backend-v2');
    const topnav = document.getElementById('topnav');

    function getCookie(name) {
        const cookies = document.cookie.split("; ");
        for (let c of cookies) {
            const [key, value] = c.split("=");
            if (key === name) return value;
        }
        return null;
    }

    function setSession(username) {
        const expiry = Date.now() + (60 * 60 * 1000);
        const sessionData = btoa(username + "|" + expiry);
        document.cookie = "session=" + sessionData + "; path=/";
    }

    function deleteSession() {
        document.cookie = "session=; path=/; max-age=0";
    }

    function redirectHome() {
        window.location.href = "../index.html";
    }

    const raw = getCookie("session");
    if (!raw) {
        redirectHome();
        return;
    }

    const usernameMap = {
        "DVR": "Developer",
        "TLC-Chad": "Chad",
        "TLC-Terri": "Terri",
        "NewUser": "NewUser"
    };

    function renderDashboard(username) {
        const displayName = usernameMap[username] || username;

        // Minimal view for NewUser
        if (username === "NewUser") {
            topnav.style.display = "none";
            container.innerHTML = `
                <div class="column">
                    <h3>Welcome, ${displayName}</h3>
                    <p>You are logged in.</p>
                    <button class="logout-btn" id="simple-logout">Logout</button>
                </div>
            `;
            document.getElementById("simple-logout").addEventListener("click", () => {
                deleteSession();
                redirectHome();
            });
            return;
        }

        // Full dashboard for all other users
        topnav.style.display = "flex";
        container.innerHTML = `
            <div class="column">
                <h3>Welcome, ${displayName}</h3>
                <p>You are logged in.</p>
                <button class="logout-btn" id="simple-logout">Logout</button>
            </div>
            <div class="column V2_ImagePg">
                <div class="V2_Img usr-btn" data-user="DVR">Dev</div>
                <div class="V2_Img usr-btn" data-user="TLC-Chad">Chad</div>
                <div class="V2_Img usr-btn" data-user="TLC-Terri">Terri</div>
                <div class="V2_Img usr-btn" data-user="NewUser">___</div>
            </div>
            <div class="column postCol">
                <div class="post roundcorner">
                    <iframe class="fb-frame" src="https://www.facebook.com/plugins/post.php?href=https%3A%2F%2Fwww.facebook.com%2FFacebookDevelopers%2Fposts%2F10151471074398553&width=500" scrolling="no"></iframe>
                </div>
                <div class="post roundcorner">
                    <iframe class="fb-frame" src="https://www.facebook.com/plugins/post.php?href=https%3A%2F%2Fwww.facebook.com%2FFacebookDevelopers%2Fposts%2F10151471074398553&width=500" scrolling="no"></iframe>
                </div>
            </div>
        `;

        // Logout button
        document.getElementById("simple-logout").addEventListener("click", () => {
            deleteSession();
            redirectHome();
        });

        // User buttons: switch account
        const userBtns = container.querySelectorAll(".usr-btn");
        userBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                const newUser = btn.dataset.user;
                setSession(newUser);
                renderDashboard(newUser);
            });
        });
    }

    try {
        const [user, expiry] = atob(raw).split("|");
        if (Date.now() > parseInt(expiry)) {
            deleteSession();
            redirectHome();
            return;
        }
        renderDashboard(user);
    } catch(e) {
        deleteSession();
        redirectHome();
    }

    // Topnav logout button
    document.getElementById("logout-btn").addEventListener("click", () => {
        deleteSession();
        redirectHome();
    });
})();
</script>

</body>
</html>
