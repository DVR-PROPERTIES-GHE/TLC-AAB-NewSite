<!DOCTYPE html>
<html lang="en">
<head>
  <style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center; /* horizontal center */
    align-items: center;     /* vertical center */
    background: #f5f5f5;     /* optional */
    font-family: Arial, sans-serif;
  }

  form {
    background: white;
    padding: 20px 25px;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    width: 300px;
  }

  form div {
    margin-bottom: 15px;
  }

  input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  box-sizing: border-box;
  border: 1px solid #ccc;
  border-radius: 6px;
}

  .buttons {
    display: flex;
    justify-content: space-between;
  }
</style>
<link rel="manifest" href="manifest.json">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Login | TLC Backend</title>
<link rel="icon" type="image/png" href="https://cdn0.iconfinder.com/data/icons/social-glyph/30/tumblr-60.png">
</head>
<body>


      <form id="login-form" autocomplete="on" aria-describedby="login-note">
        <div>
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" placeholder="Enter username" inputmode="text" required>
        </div>

        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter password" required>
        </div>

        <div class="buttons">
          <button type="submit" class="btn primary" id="sign-in-btn" aria-label="Sign in">Sign In</button>
          <button type="button" class="btn secondary" id="lost-btn" onclick="location.href='indexuser.html'">Lost?</button>
        </div>

        <div class="helper">
          <span id="login-note">Tip: Your username is case-sensitive.</span>
          <a href="#" onclick="window.location.href='employ-help.html#login'"; return false;">Need help?</a>
        </div>

        <div class="legal" aria-hidden="true">By signing in you agree to the company's terms of service.</div>
      </form>
  </div>

<script>
(function () {
  const form = document.getElementById('login-form');
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');

  const USERS_JSON_URL =
    "https://raw.githubusercontent.com/MurderMansion-Devs/TLC-AAB/main/users.json";

  // ---------- SHA-384 ----------
  async function sha384(text) {
    const encoder = new TextEncoder();
    const data = encoder.encode(text);
    const hashBuffer = await crypto.subtle.digest("SHA-384", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
  }

  // ---------- LOGIN ----------
  form.addEventListener('submit', async function (e) {
    e.preventDefault();

    const username = usernameInput.value.trim();
    const password = passwordInput.value;

    if (!username || !password) {
      alert("Please fill both fields.");
      return;
    }

    try {
      const response = await fetch(USERS_JSON_URL, { cache: "no-store" });
      const data = await response.json();

      const passwordHash = await sha384(password);

      const valid = data.users.some(u =>
        u.username === username &&
        u.passwordHash === passwordHash
      );

      if (valid) {
        location.href = 'index.html?valid=true';
      } else {
        flashInvalid();
      }
    }
    catch (err) {
      console.error(err);
      alert("Authentication service unavailable.");
    }
  });

  // ---------- INVALID SHAKE ----------
  function flashInvalid() {
    const card = document.querySelector('.card');
    card.animate([
      { transform: 'translateX(0)' },
      { transform: 'translateX(-8px)' },
      { transform: 'translateX(8px)' },
      { transform: 'translateX(0)' }
    ], { duration: 300, easing: 'ease-in-out' });
  }

  // Mobile Enter key support
  passwordInput.addEventListener('keyup', function (e) {
    if (e.key === 'Enter')
      form.dispatchEvent(new Event('submit', { cancelable: true }));
  });
})();
</script>


</body>
</html>
