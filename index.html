<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
	<link rel="icon" type="image/png" href="https://cdn0.iconfinder.com/data/icons/social-glyph/30/tumblr-60.png">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>TLC Backend</title>
</head>
<body>
	<section id="backend-v2">

	</section>

	<script src="script.js"></script>
<script>
(function () {
  function getCookie(name) {
    const cookies = document.cookie.split("; ");
    for (let c of cookies) {
      const [key, value] = c.split("=");
      if (key === name) return value;
    }
    return null;
  }

  function deleteSession() {
    document.cookie = "session=; path=/; max-age=0";
  }

  function redirect() {
    window.location.href = "indexuser.html";
  }

  const raw = getCookie("session");

  if (!raw) {
    redirect();
    return;
  }

  try {
    const [user, expiry] = atob(raw).split("|");

    if (Date.now() > parseInt(expiry)) {
      deleteSession();
      redirect();
      return;
    }

    // Show user
    document.getElementById("backend-v2").innerHTML =
      "<h2>Welcome, " + user + "</h2>";

  } catch (e) {
    deleteSession();
    redirect();
  }
})();
</script>
</body>
</html>
