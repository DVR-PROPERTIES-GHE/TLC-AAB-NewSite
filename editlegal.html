<script>
const OWNER = "dvr-properties-ghe";
const REPO = "TLC-AAB-NewSite";
const PATH = "tos.txt";

/* ⚠️ TEST TOKEN (temporary only) */
const TOKEN = "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";

let currentSHA = null;

/* ---------- SESSION ---------- */

function getCookie(name) {
    const cookies = document.cookie.split("; ");
    for (let c of cookies) {
        const [key, value] = c.split("=");
        if (key === name) return value;
    }
    return null;
}

function decodeSession(raw) {
    try {
        return atob(raw).split("|")[0];
    } catch {
        return null;
    }
}

/* ---------- ACCESS ---------- */

const rawSession = getCookie("session");
const username = rawSession ? decodeSession(rawSession) : null;
const app = document.getElementById("app");

if (username !== "DVR") {
    app.innerHTML = `
        <div class="blocked">
            <h1>Page Blocked</h1>
        </div>
    `;
} else {
    renderEditor();
}

/* ---------- UTIL ---------- */

function decodeBase64(base64) {
    return decodeURIComponent(escape(atob(base64.replace(/\n/g, ""))));
}

/* ---------- EDITOR ---------- */

function renderEditor() {
    app.innerHTML = `
        <div class="columns">
            <div class="column">
                <h3>Edit tos.txt</h3>

                <textarea id="content"></textarea>

                <button onclick="loadFile()">Load File</button>
                <button onclick="updateFile()">Save Changes</button>
            </div>
        </div>
    `;

    // auto-load on open
    loadFile();
}

/* ---------- LOAD ---------- */

async function loadFile() {
    const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,
        {
            headers: { Authorization: `token ${TOKEN}` }
        }
    );

    const data = await res.json();

    if (data.content) {
        currentSHA = data.sha;
        document.getElementById("content").value = decodeBase64(data.content);
    } else {
        alert("Failed to load file");
        console.log(data);
    }
}

/* ---------- SAVE ---------- */

async function updateFile() {
    const content = document.getElementById("content").value;

    const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,
        {
            method: "PUT",
            headers: {
                Authorization: `token ${TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: "Update tos.txt via admin panel",
                content: btoa(unescape(encodeURIComponent(content))),
                sha: currentSHA
            })
        }
    );

    const result = await res.json();

    if (res.ok) {
        alert("Saved!");
        currentSHA = result.content.sha;
    } else {
        alert("Error saving file");
        console.log(result);
    }
}
</script>
