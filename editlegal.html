<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="https://cdn0.iconfinder.com/data/icons/social-glyph/30/tumblr-60.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLC Admin - Edit File</title>

<style>
body {
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
}

.header {
    background-color: lightgray;
    padding: 30px 10px;
}

.header h2 {
    margin: 10px 0;
    font-size: 32px;
}

.topnav {
    background-color: darkslategray;
    padding: 8px 0;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.link-topnav {
    color: whitesmoke;
    margin: 0 8px;
    text-decoration: none;
    font-size: 15px;
    padding: 4px 8px;
}

.link-topnav:hover {
    font-weight: bold;
    cursor: pointer;
}

.columns {
    display: flex;
    justify-content: center;
    padding: 20px;
}

.column {
    max-width: 700px;
    width: 95%;
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

textarea {
    width: 100%;
    height: 300px;
    border-radius: 10px;
    padding: 10px;
    font-size: 14px;
    resize: vertical;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background-color: darkslategray;
    color: white;
    cursor: pointer;
}

button:hover {
    background-color: black;
}

.blocked {
    margin-top: 100px;
}

.blocked h1 {
    font-size: 32px;
    color: darkred;
}
</style>
</head>

<body>

<div class="header">
    <h2>TLC Admin Dashboard</h2>
</div>

<div class="topnav">
    <a class="link-topnav" href="./Admin/index.html">Home</a>
    <a class="link-topnav" href="#">Legal</a>
    <a class="link-topnav" href="#">Posts</a>
    <a class="link-topnav" href="#">Settings</a>
</div>

<section id="app"></section>

<script>
document.addEventListener("DOMContentLoaded", () => {

const OWNER = "dvr-properties-ghe";
const REPO = "TLC-AAB-NewSite";
const PATH = "tos.txt";

/* ⚠️ TEST TOKEN */
const TOKEN = "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";

let currentSHA = null;

const app = document.getElementById("app");

/* ---------- SESSION ---------- */

function getCookie(name) {
    const cookies = document.cookie.split("; ");
    for (let c of cookies) {
        const [key, value] = c.split("=");
        if (key === name) return value;
    }
    return null;
}

function decodeSession(raw) {
    try {
        return atob(raw).split("|")[0];
    } catch {
        return null;
    }
}

/* ---------- ACCESS CHECK ---------- */

const rawSession = getCookie("session");
const username = rawSession ? decodeSession(rawSession) : null;

if (!app || username !== "DVR") {
    app.innerHTML = `
        <div class="blocked">
            <h1>Page Blocked</h1>
        </div>
    `;
    return;
}

/* ---------- UTIL ---------- */

function decodeBase64(str) {
    try {
        return atob(str.replace(/\n/g, ""));
    } catch (e) {
        console.error(e);
        return "";
    }
}

/* ---------- RENDER UI ---------- */

function renderEditor() {
    app.innerHTML = `
        <div class="columns">
            <div class="column">
                <h3>Edit tos.txt</h3>

                <textarea id="content" placeholder="Loading..."></textarea>

                <button onclick="loadFile()">Load File</button>
                <button onclick="updateFile()">Save Changes</button>
            </div>
        </div>
    `;

    loadFile();
}

/* ---------- LOAD FILE ---------- */

window.loadFile = async function () {
    try {
        const res = await fetch(
            `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,
            {
                headers: {
                    Authorization: `token ${TOKEN}`
                }
            }
        );

        const data = await res.json();

        if (!res.ok) throw new Error(data.message);

        currentSHA = data.sha;
        document.getElementById("content").value = decodeBase64(data.content);

    } catch (err) {
        console.error(err);
        alert("Failed to load file");
    }
};

/* ---------- SAVE FILE ---------- */

window.updateFile = async function () {
    try {
        const content = document.getElementById("content").value;

        const res = await fetch(
            `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,
            {
                method: "PUT",
                headers: {
                    Authorization: `token ${TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "Update tos.txt",
                    content: btoa(unescape(encodeURIComponent(content))),
                    sha: currentSHA
                })
            }
        );

        const result = await res.json();

        if (!res.ok) throw new Error(result.message);

        currentSHA = result.content.sha;
        alert("Saved!");

    } catch (err) {
        console.error(err);
        alert("Save failed");
    }
};

/* ---------- START ---------- */

renderEditor();

});
</script>

</body>
</html>
